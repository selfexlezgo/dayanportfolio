<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAYAN TIRMIZI | HUB</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg: #000000;
            --white: #ffffff;
            --accent: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --font-bold: 'Syncopate', sans-serif;
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair !important; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1200px;
        }

        /* --- BACKGROUND --- */
        .bg-canvas {
            position: fixed;
            inset: -50px;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            mask-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), black 0%, transparent 80%);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            z-index: 100;
            border-right: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .side-trigger {
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-family: var(--font-bold);
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: var(--white);
            transform: rotate(180deg);
            text-decoration: none;
        }

        .burger-lines { display: flex; flex-direction: column; gap: 5px; padding: 20px; transition: 0.3s; }
        .burger-lines:hover { opacity: 0.5; }
        .line { width: 25px; height: 2px; background: var(--white); }

        /* --- MAIN WRAPPER --- */
        .wrapper {
            width: 100%;
            max-width: 480px;
            padding: 80px 20px;
            z-index: 10;
            transform-style: preserve-3d;
        }

        header { text-align: center; margin-bottom: 50px; }
        .pfp-frame {
            width: 110px; height: 110px;
            margin: 0 auto 25px;
            border: 1px solid var(--white);
            padding: 5px;
            background: #000;
        }
        .pfp-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: var(--font-bold); font-size: 1.1rem; letter-spacing: 8px; text-transform: uppercase; }

        /* --- TABS --- */
        .tab-group { border-top: 1px solid var(--border); }
        .tab { border-bottom: 1px solid var(--border); }
        .tab-header {
            padding: 25px 0;
            display: flex;
            justify-content: space-between;
            background: none;
            border: none;
            width: 100%;
            color: var(--white);
            font-family: var(--font-bold);
            font-size: 0.65rem;
            letter-spacing: 3px;
        }

        .social-row { display: flex; justify-content: center; gap: 40px; padding: 30px 0; }
        .icon-link { color: #555; transition: 0.4s var(--bezier); }
        .icon-link:hover { color: var(--white); transform: scale(1.4) translateZ(30px); }

        .tab-content { max-height: 0; overflow: hidden; transition: 0.5s var(--bezier); }
        .tab.active .tab-content { max-height: 500px; padding-bottom: 20px; }

        /* --- PROJECT LINKS --- */
        .link {
            padding: 16px;
            margin-bottom: 8px;
            background: var(--accent);
            text-decoration: none;
            color: #999;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.8rem;
            transition: 0.4s var(--bezier);
        }
        .link:hover { background: var(--white); color: #000; transform: translateX(5px); }
        .link:active { transform: scale(0.98); }

        /* --- CONTACT MODAL --- */
        #contactModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #contactModal.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--white);
            padding: 40px;
            background: #000;
            transform: translateY(20px);
            transition: transform 0.5s var(--bezier);
        }
        #contactModal.active .modal-box { transform: translateY(0); }

        input, textarea {
            width: 100%; background: #0a0a0a; border: 1px solid #222; color: white;
            padding: 15px; margin-bottom: 12px; outline: none;
        }
        .send-btn {
            width: 100%; padding: 15px; background: white; color: black; border: none;
            font-family: var(--font-bold); font-size: 0.7rem; letter-spacing: 2px;
        }

        footer { margin-top: 40px; text-align: center; font-size: 0.5rem; opacity: 0.2; letter-spacing: 5px; }

    </style>
</head>
<body>

    <div class="bg-canvas" id="grid"></div>

    <div class="sidebar" onclick="openContact()">
        <div class="burger-lines">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <a href="javascript:void(0)" class="side-trigger">CONTACT ME</a>
    </div>

    <div id="contactModal" onclick="closeContact()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 style="font-family: var(--font-bold); font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 4px;">TERMINAL_MESSAGE</h2>
            <input type="email" id="senderEmail" placeholder="YOUR EMAIL ADDRESS">
            <input type="text" id="subject" placeholder="SUBJECT">
            <textarea id="message" rows="5" placeholder="START TYPING..."></textarea>
            <button class="send-btn" onclick="sendMail()">INITIALIZE SEND</button>
            <p style="font-size: 0.5rem; color: #333; margin-top: 25px; text-align: center; letter-spacing: 2px;">CLICK ANYWHERE TO DISCARD</p>
        </div>
    </div>

    <div class="wrapper" id="scene">
        <header>
            <div class="pfp-frame">
                <img src="https://img.sanishtech.com/u/66e2376dfe2b3e6a719a854a5ce2f6a7.jpg" alt="Dayan Tirmizi">
            </div>
            <h1>Dayan Tirmizi</h1>
            <p style="font-size: 0.6rem; letter-spacing: 4px; color: #444; margin-top: 10px;">CORE ARCHITECT // PAKIPC</p>
        </header>

        <div class="tab-group">
            <div class="tab active" id="net">
                <button class="tab-header" onclick="toggle('net')">NETWORK <span>+</span></button>
                <div class="tab-content">
                    <div class="social-row">
                        <a href="https://www.youtube.com/@Selfex200" target="_blank" class="icon-link"><i data-lucide="youtube" size="28"></i></a>
                        <a href="https://discord.com/users/mcselfex" target="_blank" class="icon-link"><i data-lucide="message-square" size="28"></i></a>
                        <a href="https://www.instagram.com/dayan.tirmizi/" target="_blank" class="icon-link"><i data-lucide="instagram" size="28"></i></a>
                    </div>
                </div>
            </div>

            <div class="tab" id="proj">
                <button class="tab-header" onclick="toggle('proj')">PROJECTS <span>+</span></button>
                <div class="tab-content">
                    <a href="https://www.pakipc.com" target="_blank" class="link" style="border-left: 2px solid white;">
                        <i data-lucide="globe"></i> PAKIPC.COM
                    </a>
                    <a href="beaconhouse_report.xlsx.xlsx" download="beaconhouse_report.xlsx" class="link">
                        <i data-lucide="file-spreadsheet"></i> REPORT
                    </a>
                    <a href="DCB ORIGINAL FINAL.xlsx.xlsx" download="DCB_Loan_System.xlsx" class="link">
                        <i data-lucide="shield-check"></i> LOAN SYSTEM
                    </a>
                    <a href="vital_mart.xlsx.xlsx" download="vital_mart_POS.xlsx" class="link">
                        <i data-lucide="shopping-cart"></i> POS SYSTEM
                    </a>
                </div>
            </div>
        </div>

        <footer>V4.0 // DAYAN_TIRMIZI_OS</footer>
    </div>

    <script>
        lucide.createIcons();

        function toggle(id) { document.getElementById(id).classList.toggle('active'); }
        function openContact() { document.getElementById('contactModal').classList.add('active'); }
        function closeContact() { document.getElementById('contactModal').classList.remove('active'); }

        function sendMail() {
            const email = document.getElementById('senderEmail').value;
            const sub = document.getElementById('subject').value;
            const msg = document.getElementById('message').value;
            if(!email || !msg) { alert("Data required for transmission."); return; }
            window.location.href = `mailto:support@pakipc.com?cc=lhgdayan@gmail.com&subject=${encodeURIComponent(sub)}&body=From: ${email}%0D%0A%0D%0A${encodeURIComponent(msg)}`;
            closeContact();
        }

        const grid = document.getElementById('grid');
        const scene = document.getElementById('scene');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth);
            const y = (e.clientY / window.innerHeight);
            grid.style.setProperty('--x', (x * 100) + '%');
            grid.style.setProperty('--y', (y * 100) + '%');
            scene.style.transform = `rotateX(${(y - 0.5) * -10}deg) rotateY(${(x - 0.5) * 10}deg)`;
        });
    </script>
</body>
</html>
