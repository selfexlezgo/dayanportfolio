<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAYAN TIRMIZI | HUB</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg: #000000;
            --white: #ffffff;
            --gold: #FFD700;
            --input-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --font-bold: 'Syncopate', sans-serif;
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair !important; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- RESTORED INTERACTIVE BACKGROUND --- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1; /* Ensures it stays behind content */
            mask-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), black 0%, transparent 80%);
            pointer-events: none;
        }

        /* --- DT LOGO --- */
        .sig {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            font-family: var(--font-bold);
            font-size: 1.8rem;
            letter-spacing: -2px;
        }
        .sig span { color: var(--gold); position: relative; }
        .sig span::after {
            content: '';
            position: absolute;
            inset: -12px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            animation: orbit 4s linear infinite;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        @keyframes orbit {
            0% { transform: rotate(0deg) scale(1); border-radius: 50%; }
            50% { transform: rotate(180deg) scale(1.1); border-radius: 30% 70% 70% 30%; }
            100% { transform: rotate(360deg) scale(1); border-radius: 50%; }
        }

        main {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            padding: 0 8%;
            gap: 10%;
            z-index: 10;
        }

        /* --- LEFT: CONTACT FORM --- */
        .contact-section {
            flex: 1;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .contact-section h2 {
            font-family: var(--font-bold);
            font-size: 0.8rem;
            letter-spacing: 6px;
            margin-bottom: 30px;
            color: var(--gold);
        }
        .form-group { margin-bottom: 20px; }
        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 15px;
            color: white;
            font-family: 'Inter';
            font-size: 0.85rem;
            outline: none;
            transition: 0.4s var(--bezier);
        }
        input:focus, textarea:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }
        
        .send-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            border: none;
            color: black;
            font-family: var(--font-bold);
            font-size: 0.65rem;
            letter-spacing: 4px;
            font-weight: bold;
            transition: 0.4s var(--bezier);
        }
        .send-btn:hover { background: var(--white); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* --- RIGHT: HUB --- */
        .hub-section {
            flex: 1;
            max-width: 480px;
            text-align: right;
        }
        .pfp {
            width: 120px; height: 120px;
            border: 1px solid var(--white);
            margin: 0 0 25px auto;
            padding: 6px;
            background: black;
        }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        
        .name-title {
            font-family: var(--font-bold);
            font-size: 1.4rem;
            letter-spacing: 12px;
            margin-bottom: 50px;
        }

        /* --- ANIMATED DROPDOWNS --- */
        .tab { border-top: 1px solid var(--border); }
        .tab-trigger {
            width: 100%;
            padding: 25px 0;
            background: none;
            border: none;
            color: white;
            font-family: var(--font-bold);
            font-size: 0.75rem;
            letter-spacing: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .tab-trigger:hover { color: var(--gold); }
        
        .tab-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-10px);
            transition: all 0.6s var(--bezier);
        }
        .tab.active .tab-content {
            max-height: 400px;
            opacity: 1;
            transform: translateY(0);
            padding-bottom: 25px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            padding: 12px 0;
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .link-item:hover { color: var(--white); transform: translateX(-10px); }

        .socials {
            display: flex;
            gap: 30px;
            justify-content: flex-end;
            padding-top: 15px;
        }
        .socials a { color: #444; transition: 0.4s; }
        .socials a:hover { color: var(--gold); transform: scale(1.3); }

        footer {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-family: var(--font-bold);
            font-size: 0.55rem;
            letter-spacing: 6px;
            opacity: 0.2;
        }

    </style>
</head>
<body>

    <div class="bg-canvas" id="grid"></div>

    <div class="sig">D<span>T</span></div>

    <main>
        <section class="contact-section">
            <h2>CONTACT</h2>
            <form action="https://formspree.io/f/support@pakipc.com" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="FULL NAME" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="EMAIL ADDRESS" required>
                </div>
                <div class="form-group">
                    <textarea name="message" rows="4" placeholder="MESSAGE"></textarea>
                </div>
                <button type="submit" class="send-btn">SEND INQUIRY</button>
            </form>
        </section>

        <section class="hub-section">
            <div class="pfp">
                <img src="https://img.sanishtech.com/u/66e2376dfe2b3e6a719a854a5ce2f6a7.jpg" alt="Dayan Tirmizi">
            </div>
            <h1 class="name-title">Dayan Tirmizi</h1>

            <div class="tab-group">
                <div class="tab active" id="proj">
                    <button class="tab-trigger" onclick="toggle('proj')">
                        <i data-lucide="chevron-right"></i> PROJECTS
                    </button>
                    <div class="tab-content">
                        <a href="https://www.pakipc.com" target="_blank" class="link-item">PAKIPC.COM <i data-lucide="external-link"></i></a>
                        <a href="beaconhouse_report.xlsx.xlsx" download class="link-item">BEACONHOUSE REPORT <i data-lucide="file-spreadsheet"></i></a>
                        <a href="DCB ORIGINAL FINAL.xlsx.xlsx" download class="link-item">DCB LOAN SYSTEM <i data-lucide="database"></i></a>
                        <a href="vital_mart.xlsx.xlsx" download class="link-item">VITAL MART POS <i data-lucide="shopping-cart"></i></a>
                    </div>
                </div>

                <div class="tab" id="net">
                    <button class="tab-trigger" onclick="toggle('net')">
                        <i data-lucide="chevron-right"></i> NETWORK
                    </button>
                    <div class="tab-content">
                        <div class="socials">
                            <a href="https://www.youtube.com/@Selfex200" target="_blank"><i data-lucide="youtube"></i></a>
                            <a href="https://discord.com/users/mcselfex" target="_blank"><i data-lucide="message-square"></i></a>
                            <a href="https://www.instagram.com/dayan.tirmizi/" target="_blank"><i data-lucide="instagram"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>BUILT BY DAYAN TIRMIZI</footer>

    <script>
        lucide.createIcons();

        function toggle(id) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => {
                if(t.id === id) {
                    t.classList.toggle('active');
                } else {
                    t.classList.remove('active');
                }
            });
        }

        // GRID TRACKER
        document.addEventListener('mousemove', (e) => {
            const grid = document.getElementById('grid');
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            grid.style.setProperty('--x', x + '%');
            grid.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
