<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAYAN TIRMIZI | HUB</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg: #000000;
            --white: #ffffff;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
            --font-bold: 'Syncopate', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair !important; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevents scrolling */
        }

        /* --- SIGNATURE LOGO (TOP LEFT) --- */
        .sig-container {
            position: fixed;
            top: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        .sig-text {
            font-family: var(--font-bold);
            font-size: 1.2rem;
            z-index: 2;
            letter-spacing: -2px;
        }

        .sig-t { color: var(--gold); }

        .sig-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid var(--gold);
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            animation: morph 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes morph {
            0% { transform: rotate(0deg); border-color: var(--gold); }
            50% { border-color: #fff; }
            100% { transform: rotate(360deg); border-color: var(--gold); }
        }

        /* --- BACKGROUND GRID --- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), black 0%, transparent 70%);
        }

        /* --- COMPACT WRAPPER --- */
        .wrapper {
            width: 100%;
            max-width: 380px;
            text-align: center;
            padding: 20px;
        }

        .pfp {
            width: 80px; height: 80px;
            border: 1px solid var(--white);
            padding: 4px;
            margin: 0 auto 15px;
        }
        .pfp img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        h1 { 
            font-family: var(--font-bold); 
            font-size: 0.9rem; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* --- TABS & LINKS --- */
        .tab-group { border-top: 1px solid var(--border); }
        
        .tab-btn {
            width: 100%;
            padding: 15px 0;
            background: none;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--white);
            font-family: var(--font-bold);
            font-size: 0.6rem;
            letter-spacing: 3px;
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
        }

        .content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .tab.active .content { max-height: 300px; padding: 10px 0; }

        .link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            text-decoration: none;
            color: #777;
            font-size: 0.75rem;
            transition: 0.3s;
        }
        .link:hover { color: var(--white); transform: translateX(5px); }
        .link i { width: 16px; }

        .socials { display: flex; justify-content: center; gap: 30px; padding: 15px 0; }
        .socials a { color: #555; transition: 0.3s; }
        .socials a:hover { color: var(--gold); }

        footer {
            margin-top: 30px;
            font-family: var(--font-bold);
            font-size: 0.45rem;
            letter-spacing: 3px;
            opacity: 0.3;
        }

        /* --- CONTACT SIDEBAR --- */
        .contact-trigger {
            position: fixed;
            right: 20px;
            bottom: 20px;
            font-family: var(--font-bold);
            font-size: 0.5rem;
            letter-spacing: 2px;
            transform: rotate(-90deg);
            transform-origin: right bottom;
            color: #444;
            text-decoration: none;
            transition: 0.3s;
        }
        .contact-trigger:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="sig-container">
        <div class="sig-ring"></div>
        <div class="sig-text">D<span class="sig-t">T</span></div>
    </div>

    <div class="bg-canvas" id="grid"></div>

    <div class="wrapper">
        <header>
            <div class="pfp">
                <img src="https://img.sanishtech.com/u/66e2376dfe2b3e6a719a854a5ce2f6a7.jpg" alt="DT">
            </div>
            <h1>Dayan Tirmizi</h1>
        </header>

        <div class="tab-group">
            <div class="tab" id="projects">
                <button class="tab-btn" onclick="toggle('projects')">PROJECTS <span>+</span></button>
                <div class="content">
                    <a href="https://www.pakipc.com" target="_blank" class="link"><i data-lucide="globe"></i> PAKIPC.COM</a>
                    <a href="beaconhouse_report.xlsx.xlsx" download class="link"><i data-lucide="file-text"></i> BEACONHOUSE REPORT</a>
                    <a href="DCB ORIGINAL FINAL.xlsx.xlsx" download class="link"><i data-lucide="briefcase"></i> DCB LOAN SYSTEM</a>
                    <a href="vital_mart.xlsx.xlsx" download class="link"><i data-lucide="shopping-cart"></i> VITAL MART POS</a>
                </div>
            </div>

            <div class="tab active" id="social">
                <button class="tab-btn" onclick="toggle('social')">NETWORK <span>+</span></button>
                <div class="content">
                    <div class="socials">
                        <a href="https://www.youtube.com/@Selfex200" target="_blank"><i data-lucide="youtube"></i></a>
                        <a href="https://discord.com/users/mcselfex" target="_blank"><i data-lucide="message-square"></i></a>
                        <a href="https://www.instagram.com/dayan.tirmizi/" target="_blank"><i data-lucide="instagram"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <footer>BUILT BY DAYAN TIRMIZI</footer>
    </div>

    <a href="mailto:support@pakipc.com" class="contact-trigger">GET IN TOUCH</a>

    <script>
        lucide.createIcons();
        function toggle(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Background effect
        document.addEventListener('mousemove', (e) => {
            document.getElementById('grid').style.setProperty('--x', (e.clientX / window.innerWidth * 100) + '%');
            document.getElementById('grid').style.setProperty('--y', (e.clientY / window.innerHeight * 100) + '%');
        });
    </script>
</body>
</html>
