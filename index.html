<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAYAN TIRMIZI | HUB</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg: #000000;
            --white: #ffffff;
            --gold: #FFD700;
            --accent: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --font-bold: 'Syncopate', sans-serif;
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair !important; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            height: 100vh; /* Fixed height to prevent body scroll */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* --- SIGNATURE LOGO (TOP LEFT) --- */
        .signature-logo {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 200;
            display: flex;
            align-items: center;
            font-family: var(--font-bold);
            font-size: 1.6rem;
        }
        .sig-d { color: var(--white); }
        .sig-t { color: var(--gold); position: relative; margin-left: 2px; }
        
        /* COOL ANIMATION AROUND T */
        .sig-t::after {
            content: '';
            position: absolute;
            inset: -12px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            animation: orbit 3s linear infinite;
            box-shadow: 0 0 15px var(--gold);
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) scale(1); opacity: 0.4; border-radius: 50%; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.4; border-radius: 50%; }
        }

        /* --- GRID BACKGROUND --- */
        .bg-canvas {
            position: fixed;
            inset: -50px;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            mask-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), black 0%, transparent 80%);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            right: 0; top: 0; bottom: 0;
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-left: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }
        .side-trigger {
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-family: var(--font-bold);
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: var(--white);
            text-decoration: none;
            opacity: 0.6;
            transition: 0.4s;
        }
        .side-trigger:hover { opacity: 1; color: var(--gold); letter-spacing: 8px; }

        /* --- MAIN WRAPPER (Sized to fit screen) --- */
        .wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
            transform-style: preserve-3d;
            height: 90vh; /* Keeps content within view */
        }

        header { text-align: center; margin-bottom: 30px; }
        .pfp-frame {
            width: 110px; height: 110px;
            margin: 0 auto 20px;
            border: 1px solid var(--white);
            padding: 5px;
            background: #000;
        }
        .pfp-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: var(--font-bold); font-size: 1.1rem; letter-spacing: 8px; text-transform: uppercase; }

        /* --- TABS --- */
        .tab-header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            background: none;
            border: none;
            width: 100%;
            color: var(--white);
            font-family: var(--font-bold);
            font-size: 0.7rem;
            letter-spacing: 4px;
            border-top: 1px solid var(--border);
            cursor: pointer !important;
        }

        .tab-content { max-height: 0; overflow: hidden; transition: 0.6s var(--bezier); }
        .tab.active .tab-content { max-height: 280px; padding-bottom: 20px; }

        /* --- LINKS --- */
        .link {
            padding: 14px;
            margin-bottom: 8px;
            background: var(--accent);
            text-decoration: none;
            color: #999;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.8rem;
            transition: 0.4s var(--bezier);
            border: 1px solid transparent;
        }
        .link:hover { background: var(--white); color: #000; border-color: var(--gold); transform: scale(1.02); }

        .social-row { display: flex; justify-content: center; gap: 40px; padding: 20px 0; }
        .icon-link { color: #555; transition: 0.4s var(--bezier); }
        .icon-link:hover { color: var(--gold); transform: scale(1.4); }

        footer {
            margin-top: auto;
            padding-top: 20px;
            text-align: center;
            font-family: var(--font-bold);
            font-size: 0.55rem;
            letter-spacing: 5px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="signature-logo">
        <span class="sig-d">D</span><span class="sig-t">T</span>
    </div>

    <div class="bg-canvas" id="grid"></div>

    <div class="sidebar">
        <a href="mailto:support@pakipc.com" class="side-trigger">GET IN TOUCH</a>
    </div>

    <div class="wrapper" id="scene">
        <header>
            <div class="pfp-frame">
                <img src="https://img.sanishtech.com/u/66e2376dfe2b3e6a719a854a5ce2f6a7.jpg" alt="Dayan Tirmizi">
            </div>
            <h1>Dayan Tirmizi</h1>
        </header>

        <div class="tab-group">
            <div class="tab" id="net">
                <button class="tab-header" onclick="toggle('net')">NETWORK <span>+</span></button>
                <div class="tab-content">
                    <div class="social-row">
                        <a href="https://www.youtube.com/@Selfex200" target="_blank" class="icon-link"><i data-lucide="youtube"></i></a>
                        <a href="https://discord.com/users/mcselfex" target="_blank" class="icon-link"><i data-lucide="message-square"></i></a>
                        <a href="https://www.instagram.com/dayan.tirmizi/" target="_blank" class="icon-link"><i data-lucide="instagram"></i></a>
                    </div>
                </div>
            </div>

            <div class="tab active" id="proj">
                <button class="tab-header" onclick="toggle('proj')">PROJECTS <span>+</span></button>
                <div class="tab-content">
                    <a href="https://www.pakipc.com" target="_blank" class="link">
                        <i data-lucide="globe"></i> PAKIPC.COM
                    </a>
                    <a href="beaconhouse_report.xlsx.xlsx" download="Dayan_Report.xlsx" class="link">
                        <i data-lucide="file-spreadsheet"></i> BEACONHOUSE REPORT
                    </a>
                    <a href="DCB ORIGINAL FINAL.xlsx.xlsx" download="DCB_Loan_System.xlsx" class="link">
                        <i data-lucide="shield-check"></i> DCB LOAN SYSTEM
                    </a>
                    <a href="vital_mart.xlsx.xlsx" download="VitalMart_POS.xlsx" class="link">
                        <i data-lucide="shopping-cart"></i> VITAL MART POS
                    </a>
                </div>
            </div>
        </div>

        <footer>Built by Dayan Tirmizi</footer>
    </div>

    <script>
        lucide.createIcons();

        function toggle(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const grid = document.getElementById('grid');
        const scene = document.getElementById('scene');
        
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth);
            const y = (e.clientY / window.innerHeight);
            
            grid.style.setProperty('--x', (x * 100) + '%');
            grid.style.setProperty('--y', (y * 100) + '%');
            
            // Subtle 3D tilt effect
            const rotateX = (y - 0.5) * -12;
            const rotateY = (x - 0.5) * 12;
            scene.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
    </script>
</body>
</html>
