<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAYAN TIRMIZI | HUB</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg: #000000;
            --white: #ffffff;
            --gold: #FFD700;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
            --font-bold: 'Syncopate', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair !important; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- OPERA COMPATIBLE BACKGROUND --- */
        #grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        /* --- SIGNATURE LOGO --- */
        .sig {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            font-family: var(--font-bold);
            font-size: 1.5rem;
        }
        .sig-d { color: white; }
        .sig-t { color: var(--gold); position: relative; }
        .sig-t::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        main {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 10;
            padding: 0 5%;
            align-items: center;
            gap: 5%;
        }

        /* --- LEFT: CONTACT (STAY OPEN) --- */
        .contact-box {
            flex: 1;
            max-width: 400px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--border);
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .contact-box h2 {
            font-family: var(--font-bold);
            font-size: 0.7rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: var(--gold);
        }
        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 12px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }
        .send-btn {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            border: none;
            font-family: var(--font-bold);
            font-size: 0.6rem;
            letter-spacing: 3px;
            font-weight: bold;
            transition: 0.3s;
        }
        .send-btn:hover { background: white; transform: translateY(-3px); }

        /* --- RIGHT: HUB --- */
        .hub-box {
            flex: 1.2;
            text-align: right;
            max-width: 500px;
        }
        .pfp-container {
            width: 110px; height: 110px;
            border: 1px solid white;
            padding: 5px;
            margin-left: auto;
            margin-bottom: 20px;
        }
        .pfp-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .name-header {
            font-family: var(--font-bold);
            font-size: 1.2rem;
            letter-spacing: 8px;
            margin-bottom: 40px;
        }

        /* --- ACCORDION ANIMATION --- */
        .accordion { border-top: 1px solid var(--border); }
        .acc-btn {
            width: 100%;
            background: none;
            border: none;
            color: white;
            padding: 20px 0;
            font-family: var(--font-bold);
            font-size: 0.7rem;
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .acc-content {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion.active .acc-content {
            max-height: 300px;
            opacity: 1;
            transform: translateY(0);
            padding-bottom: 20px;
        }

        .link-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            padding: 10px 0;
            text-decoration: none;
            color: #888;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .link-row:hover { color: white; transform: translateX(-10px); }

        .socials {
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            padding-top: 15px;
        }
        .socials a { color: #444; transition: 0.3s; }
        .socials a:hover { color: var(--gold); transform: translateY(-3px); }

        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-family: var(--font-bold);
            font-size: 0.5rem;
            letter-spacing: 4px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div id="grid-bg"></div>
    <div class="glow" id="mouse-glow"></div>

    <div class="sig">
        <span class="sig-d">D</span><span class="sig-t">T</span>
    </div>

    <main>
        <section class="contact-box">
            <h2>GET IN TOUCH</h2>
            <form action="https://formspree.io/f/support@pakipc.com" method="POST">
                <input type="text" name="name" placeholder="NAME" required>
                <input type="email" name="email" placeholder="EMAIL" required>
                <textarea name="message" rows="4" placeholder="MESSAGE"></textarea>
                <button type="submit" class="send-btn">SEND MESSAGE</button>
            </form>
        </section>

        <section class="hub-box">
            <div class="pfp-container">
                <img src="https://img.sanishtech.com/u/66e2376dfe2b3e6a719a854a5ce2f6a7.jpg" alt="Dayan">
            </div>
            <h1 class="name-header">Dayan Tirmizi</h1>

            <div class="accordion active" id="p-tab">
                <button class="acc-btn" onclick="toggleAcc('p-tab')">
                    <i data-lucide="chevron-right"></i> PROJECTS
                </button>
                <div class="acc-content">
                    <a href="https://www.pakipc.com" target="_blank" class="link-row">PAKIPC.COM <i data-lucide="globe"></i></a>
                    <a href="./beaconhouse_report.xlsx.xlsx" download="Dayan_Report.xlsx" class="link-row">REPORT <i data-lucide="file-text"></i></a>
                    <a href="./DCB ORIGINAL FINAL.xlsx.xlsx" download="DCB_Loan_System.xlsx" class="link-row">DCB LOAN SYSTEM <i data-lucide="shield"></i></a>
                    <a href="./vital_mart.xlsx.xlsx" download="Vital_Mart_POS.xlsx" class="link-row">VITAL MART POS <i data-lucide="shopping-cart"></i></a>
                </div>
            </div>

            <div class="accordion" id="n-tab">
                <button class="acc-btn" onclick="toggleAcc('n-tab')">
                    <i data-lucide="chevron-right"></i> NETWORK
                </button>
                <div class="acc-content">
                    <div class="socials">
                        <a href="https://www.youtube.com/@Selfex200" target="_blank"><i data-lucide="youtube"></i></a>
                        <a href="https://discord.com/users/mcselfex" target="_blank"><i data-lucide="message-square"></i></a>
                        <a href="https://www.instagram.com/dayan.tirmizi/" target="_blank"><i data-lucide="instagram"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>BUILT BY DAYAN TIRMIZI</footer>

    <script>
        lucide.createIcons();

        function toggleAcc(id) {
            document.querySelectorAll('.accordion').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const glow = document.getElementById('mouse-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
